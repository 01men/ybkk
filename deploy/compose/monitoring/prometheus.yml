global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: aios-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
  - job_name: aios-flow-engine
    static_configs:
      - targets: ["flow-engine:8081"]
    metrics_path: /metrics
  - job_name: aios-ingest
    static_configs:
      - targets: ["ingest:8082"]
    metrics_path: /metrics
  - job_name: aios-ontology
    static_configs:
      - targets: ["ontology:8083"]
    metrics_path: /metrics
  - job_name: aios-ollama
    static_configs:
      - targets: ["ollama:11434"]
    metrics_path: /api/tags
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
