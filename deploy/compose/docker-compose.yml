# =============================================================================
# 元冰可可 AIOS — Docker Compose 一键私有化部署 (V3)
# =============================================================================
# V3 新增：
#   - 多租户 / RBAC：api + ingest + ontology 内部按 org_id 隔离
#   - ollama 改用 apps/ollama 独立 image（自动 pull qwen2.5:7b）
#   - 监控 profile=monitoring：prometheus / grafana / loki / promtail / cadvisor
# 默认配置：API / Web / PostgreSQL / Neo4j / Redis / MinIO / NATS / Temporal /
#           Flow-Engine / Ingest / Ontology / Ollama
# 监控：默认不起，需 `docker compose --profile monitoring up -d` 启用
# =============================================================================

x-common-env: &common-env
  env_file: .env
  restart: unless-stopped
  networks:
    - aios-net

services:
  # ---------------------------------------------------------------------------
  # 控制台（前端 V3）
  # ---------------------------------------------------------------------------
  web:
    image: ghcr.io/01men/ybkk-web:${AIOS_VERSION:-0.4.0}
    <<: *common-env
    container_name: aios_web_1
    ports:
      - "${AIOS_CONSOLE_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ---------------------------------------------------------------------------
  # API（后端 V3：多租户 + RBAC + /metrics）
  # ---------------------------------------------------------------------------
  api:
    image: ghcr.io/01men/ybkk-api:${AIOS_VERSION:-0.4.0}
    <<: *common-env
    container_name: aios_api_1
    ports:
      - "${AIOS_API_PORT:-8000}:8000"
    environment:
      AIOS_ONTOLOGY_URL: http://ontology:8083
      AIOS_LLM_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
      temporal:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ---------------------------------------------------------------------------
  # 数据接入 worker (V3：org_id 隔离 + /metrics)
  # ---------------------------------------------------------------------------
  ingest:
    image: ghcr.io/01men/ybkk-ingest:${AIOS_VERSION:-0.4.0}
    <<: *common-env
    container_name: aios_ingest_1
    command: ["uv", "run", "python", "-m", "aios_ingest.worker"]
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # 本体图服务 (V3：org_id 隔离 + /metrics)
  # ---------------------------------------------------------------------------
  ontology:
    image: ghcr.io/01men/ybkk-ontology:${AIOS_VERSION:-0.4.0}
    <<: *common-env
    container_name: aios_ontology_1
    command: ["uv", "run", "python", "-m", "aios_ontology.worker"]
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Flow Engine (V3：/metrics + 反 prompt injection)
  # ---------------------------------------------------------------------------
  flow-engine:
    image: ghcr.io/01men/ybkk-flow-engine:${AIOS_VERSION:-0.4.0}
    <<: *common-env
    container_name: aios_flow_engine_1
    ports:
      - "8081:8081"
    environment:
      AIOS_FLOW_TEMPORAL_HOST: temporal:7233
      AIOS_FLOW_API_URL: http://api:8000
      AIOS_LLM_URL: http://ollama:11434
      AIOS_FLOW_LOG_LEVEL: INFO
    depends_on:
      temporal:
        condition: service_healthy
      api:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ---------------------------------------------------------------------------
  # PostgreSQL（平台自有库）
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    <<: *common-env
    container_name: aios_postgres_1
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aios}
      POSTGRES_USER: ${POSTGRES_USER:-aios}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../api/src/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aios} -d ${POSTGRES_DB:-aios}"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ---------------------------------------------------------------------------
  # Neo4j（本体图）
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    <<: *common-env
    container_name: aios_neo4j_1
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/aios}
      NEO4J_PLUGINS: '[]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474/"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ---------------------------------------------------------------------------
  # Redis（缓存 + 限流）
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    <<: *common-env
    container_name: aios_redis_1
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ---------------------------------------------------------------------------
  # MinIO（对象存储）
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    <<: *common-env
    container_name: aios_minio_1
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aios}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ---------------------------------------------------------------------------
  # NATS（消息总线）
  # ---------------------------------------------------------------------------
  nats:
    image: nats:2-alpine
    <<: *common-env
    container_name: aios_nats_1
    command: ["nats-server", "-js"]
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ---------------------------------------------------------------------------
  # Temporal（流程引擎）
  # ---------------------------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:1.24
    <<: *common-env
    container_name: aios_temporal_1
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-aios}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development.yaml
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8233/"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ---------------------------------------------------------------------------
  # Ollama (V3：apps/ollama 独立 image + entrypoint 自动 pull qwen2.5:7b)
  # ---------------------------------------------------------------------------
  ollama:
    image: ghcr.io/01men/ybkk-ollama:${AIOS_VERSION:-0.4.0}
    container_name: aios_ollama_1
    restart: unless-stopped
    networks:
      - aios-net
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_KEEP_ALIVE: "24h"
      AIOS_OLLAMA_PULL_MODELS: ${AIOS_OLLAMA_PULL_MODELS:-qwen2.5:7b}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s

  # ===========================================================================
  # 监控 profile（默认不起：`docker compose --profile monitoring up -d`）
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    container_name: aios_prometheus_1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - monitoring-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - aios-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    profiles: ["monitoring"]
    container_name: aios_grafana_1
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-aios-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - aios-net
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:2.9.4
    profiles: ["monitoring"]
    container_name: aios_loki_1
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - aios-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.4
    profiles: ["monitoring"]
    container_name: aios_promtail_1
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-data:/tmp
    networks:
      - aios-net
    depends_on:
      - loki

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    profiles: ["monitoring"]
    container_name: aios_cadvisor_1
    privileged: true
    devices:
      - /dev/kmsg
    command:
      - '--docker_only=false'
      - '--housekeeping_interval=15s'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - aios-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5

# =============================================================================
# 网络与卷
# =============================================================================
networks:
  aios-net:
    driver: bridge

volumes:
  postgres-data:
  neo4j-data:
  redis-data:
  minio-data:
  nats-data:
  ollama-data:
  monitoring-data:
  grafana-data:
  loki-data:
  promtail-data: